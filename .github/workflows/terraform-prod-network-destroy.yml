name: "[Terraform] Prod Network Destroy"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  network-destroy:
    name: Prod Network Destroy
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: infra/environments/prod/network

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: eu-west-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Show network destroy context
        run: |
          set -euo pipefail

          VPC_ID=$(terraform output -raw vpc_id || true)

          echo "VPC: $VPC_ID"

          echo "NAT gateways:"
          aws ec2 describe-nat-gateways \
            --region "$AWS_REGION" \
            --filter Name=vpc-id,Values="$VPC_ID" \
            --query 'NatGateways[*].{Id:NatGatewayId,State:State,Subnet:SubnetId}' \
            --output table || true

          echo "Network interfaces:"
          aws ec2 describe-network-interfaces \
            --region "$AWS_REGION" \
            --filters Name=vpc-id,Values="$VPC_ID" \
            --query 'NetworkInterfaces[*].{Id:NetworkInterfaceId,Status:Status,Desc:Description,Owner:RequesterId,AttachmentOwner:Attachment.InstanceOwnerId,Subnet:SubnetId,PublicIp:Association.PublicIp}' \
            --output table || true

          echo "Non-default security groups:"
          aws ec2 describe-security-groups \
            --region "$AWS_REGION" \
            --filters Name=vpc-id,Values="$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].{Id:GroupId,Name:GroupName,Description:Description}" \
            --output table || true

      - name: Terraform Destroy
        timeout-minutes: 60
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=3
          SLEEP_SECONDS=120

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "=== Terraform network destroy attempt ${ATTEMPT}/${MAX_ATTEMPTS} ==="

            set +e
            terraform destroy \
              -auto-approve \
              -input=false \
              -var-file=prod.tfvars \
              -no-color \
              -compact-warnings 2>&1 | tee /tmp/terraform-network-destroy.log
            EXIT_CODE=${PIPESTATUS[0]}
            set -e

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "Terraform network destroy completed successfully"
              exit 0
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Terraform network destroy failed after ${MAX_ATTEMPTS} attempts"
              exit "$EXIT_CODE"
            fi

            echo "Terraform network destroy failed with exit code ${EXIT_CODE}."
            echo "Waiting ${SLEEP_SECONDS}s before retrying, in case AWS dependencies are still settling..."
            sleep "$SLEEP_SECONDS"
          done

      - name: Upload network destroy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-prod-network-destroy-log
          path: /tmp/terraform-network-destroy.log