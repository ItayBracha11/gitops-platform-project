name: "[Terraform] Bootstrap Backend"

run-name: "[Terraform] Bootstrap Backend"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    name: Terraform Bootstrap Backend
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: infra/bootstrap

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=bootstrap.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=bootstrap.tfvars