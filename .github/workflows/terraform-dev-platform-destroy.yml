name: "[Terraform] Dev Platform Destroy"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-destroy:
    name: Dev Platform Destroy
    runs-on: ubuntu-24.04

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (platform)
        working-directory: infra/environments/dev/platform
        run: terraform init

      - name: Terraform Destroy (platform)
        working-directory: infra/environments/dev/platform
        timeout-minutes: 30
        run: |
          set -euo pipefail

          (
            while true; do
              echo "=== terraform platform destroy still running: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!

          terraform destroy -auto-approve -var-file=dev.tfvars -no-color -compact-warnings 2>&1 | tee /tmp/terraform-platform-destroy.log
          EXIT_CODE=${PIPESTATUS[0]}

          kill $HEARTBEAT_PID || true
          exit $EXIT_CODE

      - name: Upload platform destroy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-platform-destroy-log
          path: /tmp/terraform-platform-destroy.log