name: "[Terraform] Dev Bootstrap Destroy"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap-destroy:
    name: Dev Bootstrap Destroy
    runs-on: ubuntu-24.04

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: us-east-1
      CLUSTER_NAME: eks-gitops-demo-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect runner public IP
        id: runner_ip
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\n')
          echo "cidr=${IP}/32" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Allow this runner to reach the cluster API
        run: |
          set -euo pipefail

          aws eks update-cluster-config \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --resources-vpc-config endpointPublicAccess=true,publicAccessCidrs="[\"${{ steps.runner_ip.outputs.cidr }}\"]"

          aws eks wait cluster-active \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"

      - name: Delete ArgoCD child applications
        run: |
          set -euo pipefail

          kubectl delete application demo-app-dev -n argocd --ignore-not-found=true
          kubectl delete application aws-load-balancer-controller-dev -n argocd --ignore-not-found=true
          kubectl delete application aws-load-balancer-controller-sa-dev -n argocd --ignore-not-found=true

      - name: Wait for applications to be deleted
        run: |
          set -euo pipefail

          for i in $(seq 1 40); do
            echo "Checking if target applications are gone (attempt $i)..."

            LEFT=0

            for APP in demo-app-dev aws-load-balancer-controller-dev aws-load-balancer-controller-sa-dev; do
              if kubectl get application "$APP" -n argocd >/dev/null 2>&1; then
                echo "$APP still exists"
                LEFT=1
              fi
            done

            if [ "$LEFT" -eq 0 ]; then
              echo "Target applications deleted"
              exit 0
            fi

            sleep 15
          done

          echo "Timed out waiting for target applications to be deleted"
          exit 1

      - name: Show remaining ingress (debug)
        run: |
          kubectl get ingress -A || true

      - name: Terraform Init (bootstrap)
        working-directory: infra/environments/dev/bootstrap
        run: terraform init

      - name: Terraform Destroy (bootstrap)
        working-directory: infra/environments/dev/bootstrap
        timeout-minutes: 20
        run: |
          set -euo pipefail

          (
            while true; do
              echo "=== terraform bootstrap destroy still running: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!

          terraform destroy -auto-approve -var-file=dev.tfvars -no-color -compact-warnings 2>&1 | tee /tmp/terraform-bootstrap-destroy.log
          EXIT_CODE=${PIPESTATUS[0]}

          kill $HEARTBEAT_PID || true
          exit $EXIT_CODE

      - name: Upload bootstrap destroy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-bootstrap-destroy-log
          path: /tmp/terraform-bootstrap-destroy.log