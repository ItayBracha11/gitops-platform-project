name: "[Terraform] Dev Bootstrap Destroy"

run-name: "[Terraform] Dev Bootstrap Destroy"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap-destroy:
    name: Dev Bootstrap Destroy
    runs-on: ubuntu-24.04

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect runner public IP
        id: runner_ip
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\n')
          echo "cidr=[\"${IP}/32\"]" >> "$GITHUB_OUTPUT"
          echo "Runner public IP is ${IP}/32"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (cluster)
        working-directory: infra/environments/dev/cluster
        run: terraform init

      - name: Refresh cluster access CIDR for this runner
        working-directory: infra/environments/dev/cluster
        timeout-minutes: 15
        env:
          TF_VAR_public_access_cidrs: ${{ steps.runner_ip.outputs.cidr }}
        run: |
          set -euo pipefail
          echo "::group::cluster access refresh"
          terraform apply -auto-approve -var-file=dev.tfvars -no-color 2>&1 | tee /tmp/terraform-bootstrap-destroy-cluster-refresh.log
          echo "::endgroup::"

      - name: Terraform Init (bootstrap)
        working-directory: infra/environments/dev/bootstrap
        run: terraform init

      - name: Terraform Validate (bootstrap)
        working-directory: infra/environments/dev/bootstrap
        run: terraform validate

      - name: Terraform Destroy (bootstrap)
        working-directory: infra/environments/dev/bootstrap
        timeout-minutes: 15
        run: |
          set -euo pipefail

          echo "::group::bootstrap destroy"

          (
            while true; do
              echo "=== terraform bootstrap destroy still running: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              sleep 45
            done
          ) &
          HEARTBEAT_PID=$!

          terraform destroy -auto-approve -var-file=dev.tfvars -no-color 2>&1 | tee /tmp/terraform-bootstrap-destroy.log
          EXIT_CODE=${PIPESTATUS[0]}

          kill $HEARTBEAT_PID || true
          echo "::endgroup::"
          exit $EXIT_CODE

      - name: Upload bootstrap destroy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-bootstrap-destroy-logs
          path: |
            /tmp/terraform-bootstrap-destroy-cluster-refresh.log
            /tmp/terraform-bootstrap-destroy.log