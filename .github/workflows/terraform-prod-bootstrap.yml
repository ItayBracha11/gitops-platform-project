name: "[Terraform] Prod Bootstrap"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  bootstrap:
    name: Prod Bootstrap
    runs-on: ubuntu-24.04

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: eu-west-1
      CLUSTER_NAME: eks-gitops-demo-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect runner public IP
        id: runner_ip
        run: |
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\n')
          echo "cidr=[\"${IP}/32\"]" >> "$GITHUB_OUTPUT"
          echo "Runner public IP is ${IP}/32"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (cluster)
        working-directory: infra/environments/prod/cluster
        run: terraform init

      - name: Refresh cluster access CIDR for this runner
        working-directory: infra/environments/prod/cluster
        timeout-minutes: 15
        env:
          TF_VAR_public_access_cidrs: ${{ steps.runner_ip.outputs.cidr }}
        run: |
          set -euo pipefail
          echo "::group::cluster access refresh"
          terraform apply -auto-approve -var-file=prod.tfvars -no-color -compact-warnings 2>&1 | tee /tmp/terraform-bootstrap-cluster-refresh.log
          echo "::endgroup::"

      - name: Terraform Init (bootstrap)
        working-directory: infra/environments/prod/bootstrap
        run: terraform init

      - name: Terraform Validate (bootstrap)
        working-directory: infra/environments/prod/bootstrap
        run: terraform validate -no-color

      - name: Terraform Apply (bootstrap)
        working-directory: infra/environments/prod/bootstrap
        timeout-minutes: 20
        run: |
          set -euo pipefail

          echo "::group::bootstrap apply"

          (
            while true; do
              echo "=== terraform bootstrap apply still running: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!

          terraform apply -auto-approve -var-file=prod.tfvars -no-color -compact-warnings 2>&1 | tee /tmp/terraform-bootstrap.log
          EXIT_CODE=${PIPESTATUS[0]}

          kill $HEARTBEAT_PID || true
          echo "::endgroup::"
          exit $EXIT_CODE
    
      - name: Configure kubeconfig
        run: |
          set -euo pipefail

          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"
      
      - name: Show demo app URL
        run: |
          set -euo pipefail

          echo "Waiting for demo app Ingress address..."

          for i in $(seq 1 30); do
            ADDRESS=$(kubectl get ingress demo-app -n demo-app \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)

            if [ -n "$ADDRESS" ]; then
              echo ""
              echo "======================================"
              echo "Demo app is available at:"
              echo "http://${ADDRESS}"
              echo "======================================"
              exit 0
            fi

            echo "Ingress address not ready yet (attempt $i/30)..."
            sleep 20
          done

          echo "Ingress address was not ready in time"
          kubectl get ingress -A || true
          exit 1

      - name: Upload bootstrap logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-prod-bootstrap-logs
          path: |
            /tmp/terraform-bootstrap-cluster-refresh.log
            /tmp/terraform-bootstrap.log