name: "[CI] Build and Push Image to ECR"

run-name: "[CI] Build Image (${{ github.sha }})"

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build-and-push-ecr.yml'
  workflow_dispatch:

permissions:
  contents: write   

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gitops-demo-app
  DEV_VALUES_FILE: "gitops/apps/demo-app/values-dev.yaml"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}  # ensures push works

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./app

      - name: Tag image for ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push image to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker push \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update dev Helm values
        run: |
          sed -i "s/tag:.*/tag: $IMAGE_TAG/" $DEV_VALUES_FILE

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add $DEV_VALUES_FILE
          git commit -m "Update dev image tag to $IMAGE_TAG [skip ci]" || echo "No changes"
          git push