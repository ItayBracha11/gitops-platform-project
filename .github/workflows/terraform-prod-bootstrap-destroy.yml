name: "[Terraform] Prod Bootstrap Destroy"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  bootstrap-destroy:
    name: Prod Bootstrap Destroy
    runs-on: ubuntu-24.04

    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: eu-west-1
      CLUSTER_NAME: eks-gitops-demo-prod
      ARGOCD_NAMESPACE: argocd
      ROOT_APP_NAME: root-app
      CONTROLLER_NAMESPACE: kube-system

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect runner public IP
        id: runner_ip
        run: |
          set -euo pipefail
          IP=$(curl -s https://checkip.amazonaws.com | tr -d '\n')
          echo "cidr=${IP}/32" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Allow this runner to reach the cluster API
        run: |
          set -euo pipefail

          aws eks update-cluster-config \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --resources-vpc-config endpointPublicAccess=true,publicAccessCidrs="[\"${{ steps.runner_ip.outputs.cidr }}\"]"

          aws eks wait cluster-active \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$CLUSTER_NAME"

      - name: Ensure scripts are executable
        run: chmod +x scripts/bootstrap_destroy_argocd_children.sh

      - name: Delete child ArgoCD applications and their resources
        run: |
          set -euo pipefail
          ./scripts/bootstrap_destroy_argocd_children.sh

      - name: Terraform Init (bootstrap)
        working-directory: infra/environments/prod/bootstrap
        run: terraform init

      - name: Terraform Destroy (bootstrap)
        working-directory: infra/environments/prod/bootstrap
        timeout-minutes: 20
        run: |
          set -euo pipefail

          (
            while true; do
              echo "=== terraform bootstrap destroy still running: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              sleep 60
            done
          ) &
          HEARTBEAT_PID=$!

          terraform destroy -auto-approve -var-file=prod.tfvars -no-color -compact-warnings 
          EXIT_CODE=$?

          kill $HEARTBEAT_PID || true
          exit $EXIT_CODE