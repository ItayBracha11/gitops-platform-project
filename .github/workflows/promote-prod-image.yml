name: "[CD] Promote Image to Production"

run-name: "[CD] Promote Image to Production"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote. Leave empty to promote current dev tag."
        required: false
        type: string

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gitops-demo-app
  DEV_VALUES_FILE: "gitops/apps/demo-app/values-dev.yaml"
  PROD_VALUES_FILE: "gitops/apps/demo-app/values-prod.yaml"

jobs:
  promote:
    name: Promote Image to Production
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Resolve image tag
        id: image
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_TAG" ]; then
            IMAGE_TAG="$INPUT_TAG"
          else
            IMAGE_TAG=$(grep 'tag:' "$DEV_VALUES_FILE" | awk '{print $2}')
          fi

          echo "Promoting image tag: $IMAGE_TAG"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate image exists in ECR
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --region "$AWS_REGION" >/dev/null

      - name: Update prod Helm values
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          sed -i "s/tag:.*/tag: $IMAGE_TAG/" "$PROD_VALUES_FILE"

      - name: Commit changes
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add "$PROD_VALUES_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Promote prod image to $IMAGE_TAG [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main