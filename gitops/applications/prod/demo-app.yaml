apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ItayBracha11/gitops-platform-project.git
    targetRevision: HEAD
    path: gitops/apps/demo-app
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true