apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller-sa-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ItayBracha11/gitops-platform-project.git
    targetRevision: HEAD
    path: gitops/infrastructure/alb-controller
    
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true